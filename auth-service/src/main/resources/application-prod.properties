
# AUTH SERVICE - Production (Docker) Profile

server.port=${SERVER_PORT:8097}

# Docker Database Configuration (require explicit env vars in production)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA Settings (minimal logging in production)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Secret (must be provided via env)
jwt.secret=${JWT_SECRET}

# AWS SES via SMTP
spring.mail.host=email-smtp.us-east-1.amazonaws.com
spring.mail.port=587
spring.mail.username=${SES_USERNAME}
spring.mail.password=${SES_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=email-smtp.us-east-1.amazonaws.com
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.debug=false
mail.from=info@tcmslk.me
mail.enabled=${MAIL_ENABLED:false}

# Logging
logging.level.org.springframework.security=WARN
logging.level.root=INFO
