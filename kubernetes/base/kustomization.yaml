apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: issue-app

resources:
  # ==========================================
  # 1. CORE INFRASTRUCTURE LAYER
  # ==========================================
  - infrastructure/namespace.yaml
  - infrastructure/secret-store.yaml
  - infrastructure/ingress.yaml
  - infrastructure/serviceaccount.yaml # <-- Ensure this has the folder prefix!

  # ==========================================
  # 2. MICROSERVICES LAYER
  # ==========================================
  # API Gateway
  - services/api-gateway/deployment.yaml
  - services/api-gateway/service.yaml
  - services/api-gateway/external-secret.yaml

  # Auth Service
  - services/auth-service/deployment.yaml
  - services/auth-service/service.yaml
  - services/auth-service/external-secret.yaml
  - services/auth-service/configmap.yaml

  # Issue Service
  - services/issue-service/deployment.yaml
  - services/issue-service/service.yaml
  - services/issue-service/external-secret.yaml
  - services/issue-service/configmap.yaml
  - services/issue-service/pvc.yaml

  # Frontend Service
  - services/frontend-service/deployment.yaml
  - services/frontend-service/service.yaml