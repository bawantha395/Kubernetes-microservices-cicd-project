apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: issue-app-sa
      containers:
        - name: auth-service
          image: auth-service:latest
          ports:
            - containerPort: 8097
          resources:
            requests:
              cpu: "100m"       
              memory: "256Mi"  
            limits:
              cpu: "500m"
              memory: "1Gi"  
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseSerialGC -Xss256k -Xms256m -Xmx512m"
            # 🟢 PHYSICAL ISOLATION UPDATE: Points directly to your dedicated Auth RDS cluster hardware
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://<YOUR_AUTH_RDS_INSTANCE_ENDPOINT>:3306/game_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_SECRET
            - name: APP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: APP_ADMIN_EMAIL
            - name: APP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: APP_ADMIN_PASSWORD
            - name: SES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SES_USERNAME
            - name: SES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SES_PASSWORD
            - name: MAIL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: MAIL_ENABLED