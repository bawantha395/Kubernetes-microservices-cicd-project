apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: issue-app-sa
      containers:
        - name: auth-service
          image: auth-service:latest
          ports:
            - containerPort: 8097
          resources:
            requests:
              cpu: "50m"       # Down from 250m
              memory: "128Mi"  # Down from 512Mi
            limits:
              cpu: "200m"
              memory: "256Mi"  # Down from 1Gi
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_SECRET
            - name: APP_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: APP_ADMIN_EMAIL
            - name: APP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: APP_ADMIN_PASSWORD
            - name: SES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SES_USERNAME
            - name: SES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SES_PASSWORD
            - name: MAIL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: MAIL_ENABLED
