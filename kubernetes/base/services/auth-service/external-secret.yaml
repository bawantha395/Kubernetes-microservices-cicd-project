apiVersion: external-secrets.io/v1 # 🚀 Updated from v1beta1 to v1 stable
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: issue-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: auth-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: prod/issue/db
        property: username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: prod/issue/db
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: prod/game/jwt
        property: secret
    - secretKey: APP_ADMIN_EMAIL
      remoteRef:
        key: prod/issue/admin
        property: email
    - secretKey: APP_ADMIN_PASSWORD
      remoteRef:
        key: prod/issue/admin
        property: password
    - secretKey: SES_USERNAME
      remoteRef:
        key: prod/issue/ses
        property: username
    - secretKey: SES_PASSWORD
      remoteRef:
        key: prod/issue/ses
        property: password