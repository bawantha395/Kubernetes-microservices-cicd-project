apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      serviceAccountName: issue-app-sa # 🟢 Preserved your custom service account mapping
      containers:
        - name: frontend-service
          image: frontend-service:latest
          ports:
            - containerPort: 3000
          stdin: true
          tty: true
          resources:
            requests:
              cpu: "100m"       
              memory: "256Mi"  
            limits:
              cpu: "500m"
              memory: "1Gi"  
          env:
            # 🟢 UPGRADE: Explicitly maps the Node.js V8 heap ceiling to prevent OOMKilled evictions
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
            - name: REACT_APP_API_BASE_URL
              value: "/api"