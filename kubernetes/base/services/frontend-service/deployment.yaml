apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      serviceAccountName: issue-app-sa
      containers:
        - name: frontend-service
          image: frontend-service:latest
          ports:
            - containerPort: 3000
          # 🟢 UPGRADE: Forces react-scripts to stay alive inside a headless cloud container
          stdin: true
          tty: true
          resources:
            requests:
              cpu: "50m"       # Down from 250m
              memory: "128Mi"  # Down from 512Mi
            limits:
              cpu: "200m"
              memory: "512Mi"  # Down from 1Gi
          env:
            - name: REACT_APP_API_BASE_URL
              value: "/api"