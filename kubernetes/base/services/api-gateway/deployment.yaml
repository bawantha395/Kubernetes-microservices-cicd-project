apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: issue-app
spec:
  revisionHistoryLimit: 3  # 🟢 RIGHT HERE! At the same indentation level as replicas
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: issue-app-sa
      containers:
        - name: api-gateway
          image: api-gateway:latest
          ports:
            - containerPort: 8096
          resources:
            requests:
              cpu: "50m"       
              memory: "128Mi"  
            limits:
              cpu: "200m"
              memory: "256Mi"  
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: JWT_SECRET
            - name: CORS_ALLOWED_ORIGIN
              value: "https://lb.tcmslk.me" # 🟢 Don't forget to update this to match your LB URL!