apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/bawantha395/Kubernetes-microservices-cicd-project.git
    targetRevision: prod
    path: kubernetes/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: issue-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
