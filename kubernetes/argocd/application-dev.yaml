apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: issue-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/bawantha395/sample_game_backend.git'
    targetRevision: dev
    path: kubernetes/environments/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: issue-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
