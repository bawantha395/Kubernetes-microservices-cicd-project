apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 87.4.0  # Stable production-tested tracking version
    helm:
      values: |
        grafana:
          adminPassword: "admin123"  # Matches Step 10 of your runbook
          persistence:
            enabled: true
            storageClassName: "gp2"
            size: 10Gi
        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: "gp2"
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring  # Matches Step 10 and 11 of your runbook
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  # Automatically provisions the 'monitoring' namespace
      - ServerSideApply=true  # Necessary for massive Prometheus CRDs