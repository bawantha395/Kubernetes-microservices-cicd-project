apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 87.4.0  # Stable production-tested tracking version
    helm:
      values: |
        grafana:
          adminPassword: "admin123"  # Matches Step 10 of your runbook
          persistence:
            enabled: false           # 🟢 FIXED: Set to false to bypass missing AWS EBS driver blocks
        prometheus:
          prometheusSpec:
            retention: 7d
            # 🟢 FIXED: Completely removed the persistent volumeClaimTemplate storageSpec block 
            # to allow Prometheus to initialize out-of-the-box using node memory resources.
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring  # Matches Step 10 and 11 of your runbook
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  # Automatically provisions the 'monitoring' namespace
      - ServerSideApply=true  # Necessary for massive Prometheus CRDs