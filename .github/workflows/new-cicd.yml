name: new-cicd
on:
  push:
    branches:
      - prod
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      environment:
        description: 'Environment to target'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

env:
  TARGET_ENV: ${{ github.event.inputs.environment || 'prod' }}
  TARGET_ACTION: ${{ github.event.inputs.action || 'deploy' }}

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # JOB 1: BUILD & TEST (Validates Infra & Code Plans)
  # ==========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    steps:
      - name: 1. Checkout Code Base
        uses: actions/checkout@v4

      - name: 2. Configure AWS Access
        id: aws-login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Dynamic Pre-Flight S3 & DynamoDB Bootstrapping
        id: bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          BUCKET_NAME="issue-app-tf-state-${ACCOUNT_ID}"
          TABLE_NAME="issue-app-tf-locks"
          echo "using_bucket=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "using_table=$TABLE_NAME" >> $GITHUB_OUTPUT
          
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET_NAME" --region us-east-1
          fi
          if ! aws dynamodb describe-table --table-name "$TABLE_NAME" 2>/dev/null; then
            aws dynamodb create-table --table-name "$TABLE_NAME" --attribute-definitions AttributeName=LockID,AttributeType=S --key-schema AttributeName=LockID,KeyType=HASH --billing-mode PAY_PER_REQUEST --region us-east-1
          fi

      - name: 4. Initialize Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: 5. Execute Code Schema Test & Plan Validation
        run: |
          cd terraform/environments/${{ env.TARGET_ENV }}
          terraform init \
            -backend-config="bucket=${{ steps.bootstrap.outputs.using_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.bootstrap.outputs.using_table }}" \
            -backend-config="key=${{ env.TARGET_ENV }}/terraform.tfstate"
          
          echo "=== RUNNING INFRASTRUCTURE AND COMPILATION VALIDATION ==="
          terraform plan -lock-timeout=10m
        env:
          TF_VAR_db_username: ${{ env.TARGET_ENV == 'prod' && secrets.DB_USERNAME_PROD || secrets.DB_USERNAME_DEV }}
          TF_VAR_db_password: ${{ env.TARGET_ENV == 'prod' && secrets.DB_PASSWORD_PROD || secrets.DB_PASSWORD_DEV }}

  # ==========================================
  # JOB 2: DEPLOY (Executes synchronization after Test Passes)
  # ==========================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Code Base
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Configure AWS Access
        id: aws-login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Dynamic Pre-Flight S3 & DynamoDB Bootstrapping
        id: bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          echo "using_bucket=issue-app-tf-state-${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "using_table=issue-app-tf-locks" >> $GITHUB_OUTPUT

      - name: 4. Initialize Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: 5. Execute Infrastructure Provisioning
        run: |
          cd terraform/environments/${{ env.TARGET_ENV }}
          terraform init \
            -backend-config="bucket=${{ steps.bootstrap.outputs.using_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.bootstrap.outputs.using_table }}" \
            -backend-config="key=${{ env.TARGET_ENV }}/terraform.tfstate"
          
          terraform apply -lock-timeout=10m -auto-approve
        env:
          TF_VAR_db_username: ${{ env.TARGET_ENV == 'prod' && secrets.DB_USERNAME_PROD || secrets.DB_USERNAME_DEV }}
          TF_VAR_db_password: ${{ env.TARGET_ENV == 'prod' && secrets.DB_PASSWORD_PROD || secrets.DB_PASSWORD_DEV }}

      - name: 6. Extract Live Cloud Target Data
        id: cloud-data
        run: |
          cd terraform/environments/${{ env.TARGET_ENV }}
          RAW_DB=$(terraform output -raw database_endpoint)
          CLEAN_DB=$(echo $RAW_DB | cut -d':' -f1)
          RAW_ECR=$(terraform output -raw ecr_repository_url)
          echo "db_host=$CLEAN_DB" >> $GITHUB_OUTPUT
          echo "ecr_url=$RAW_ECR" >> $GITHUB_OUTPUT

      - name: 7. Inject Live Database Configurations
        run: |
          sed -i "s|RDS_ENDPOINT_PLACEHOLDER|${{ steps.cloud-data.outputs.db_host }}|g" kubernetes/environments/${{ env.TARGET_ENV }}/kustomization.yaml

      - name: 8. Authenticate Container Engine to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 9. Build and Publish Application Image
        run: |
          cd api-gateway 
          
          IMAGE_TAG_SHORT=${GITHUB_SHA::7}
          IMAGE_TAG_FULL=${GITHUB_SHA}
          REGISTRY_URL=${{ steps.cloud-data.outputs.ecr_url }}
          
          docker build -t $REGISTRY_URL:$IMAGE_TAG_SHORT -t $REGISTRY_URL:$IMAGE_TAG_FULL .
          docker push $REGISTRY_URL:$IMAGE_TAG_SHORT
          docker push $REGISTRY_URL:$IMAGE_TAG_FULL
          
          echo "FINAL_TAG=$IMAGE_TAG_FULL" >> $GITHUB_ENV

      - name: 10. Set Up Kustomize Controller
        uses: imranismail/setup-kustomize@v2

      - name: 11. Update Kubernetes Resource Blueprints
        run: |
          REGISTRY_URL=${{ steps.cloud-data.outputs.ecr_url }}
          cd kubernetes/environments/${{ env.TARGET_ENV }}
          kustomize edit set image api-gateway=$REGISTRY_URL:${{ env.FINAL_TAG }}

      - name: 12. Commit and Push Manifest Changes to Git
        run: |
          git config --global user.name "GitHub Actions Automation"
          git config --global user.email "actions@github.com"
          git add kubernetes/environments/${{ env.TARGET_ENV }}/kustomization.yaml
          git diff-index --quiet HEAD || git commit -m "chore(gitops): auto-synced variables for ${{ env.TARGET_ENV }} environment [skip ci]"
          git push origin prod

  # ==========================================
  # JOB 3: DESTROY (Standalone Teardown Track)
  # ==========================================
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    steps:
      - name: 1. Checkout Code Base
        uses: actions/checkout@v4

      - name: 2. Configure AWS Access
        id: aws-login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Dynamic Pre-Flight S3 Map Verification
        id: bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          echo "using_bucket=issue-app-tf-state-${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "using_table=issue-app-tf-locks" >> $GITHUB_OUTPUT

      - name: 3.1 Inspect Existing Terraform Locks
        run: |
          echo "Checking active lock records in DynamoDB table: ${{ steps.bootstrap.outputs.using_table }}"
          aws dynamodb scan \
            --table-name "${{ steps.bootstrap.outputs.using_table }}" \
            --projection-expression "LockID, #i" \
            --expression-attribute-names '{"#i":"Info"}' \
            --region us-east-1 || true

      - name: 4. Initialize Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: 5. Execute Core Teardown
        run: |
          cd terraform/environments/${{ env.TARGET_ENV }}
          terraform init \
            -backend-config="bucket=${{ steps.bootstrap.outputs.using_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.bootstrap.outputs.using_table }}" \
            -backend-config="key=${{ env.TARGET_ENV }}/terraform.tfstate"
          
          echo "🗑️ Launching complete ecosystem destruction..."
          terraform destroy -lock-timeout=10m -auto-approve
        env:
          TF_VAR_db_username: ${{ env.TARGET_ENV == 'prod' && secrets.DB_USERNAME_PROD || secrets.DB_USERNAME_DEV }}
          TF_VAR_db_password: ${{ env.TARGET_ENV == 'prod' && secrets.DB_PASSWORD_PROD || secrets.DB_PASSWORD_DEV }}

      - name: 6. Run Post-Destroy Target Cleanup
        run: |
          echo "🧹 Sweeping active dependencies and logs missed by modules..."
          ECR_REPOS=$(aws ecr describe-repositories --region us-east-1 --query "repositories[?contains(repositoryName, 'issue-app-${{ env.TARGET_ENV }}')].repositoryName" --output text 2>/dev/null || echo "")
          for repo in $ECR_REPOS; do
            aws ecr delete-repository --repository-name $repo --force --region us-east-1 2>/dev/null || true
          done
          LOG_GROUPS=$(aws logs describe-log-groups --region us-east-1 --query "logGroups[?contains(logGroupName, 'issue-app-${{ env.TARGET_ENV }}')].logGroupName" --output text 2>/dev/null || echo "")
          for lg in $LOG_GROUPS; do
            aws logs delete-log-group --log-group-name $lg --region us-east-1 2>/dev/null || true
          done
          echo "✅ Teardown complete. Account billing stopped for ${{ env.TARGET_ENV }}."