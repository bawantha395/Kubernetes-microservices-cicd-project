name: new-cicd
on:
  push:
    branches:
      - prod
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      environment:
        description: 'Environment to target'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

env:
  TARGET_ENV: ${{ github.event.inputs.environment || 'prod' }}
  TARGET_ACTION: ${{ github.event.inputs.action || 'deploy' }}

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # STAGE 1: BUILD AND TEST (Validation & Plan Generation)
  # ==========================================================================
  build-and-test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    steps:
      - name: 1. Checkout Code Base
        uses: actions/checkout@v4

      - name: 2. Configure AWS Access
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Dynamic Pre-Flight S3 & DynamoDB Bootstrapping
        id: bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          BUCKET_NAME="issue-app-tf-state-${ACCOUNT_ID}"
          TABLE_NAME="issue-app-tf-locks"
          echo "using_bucket=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "using_table=$TABLE_NAME" >> $GITHUB_OUTPUT
          
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET_NAME" --region us-east-1
          fi
          if ! aws dynamodb describe-table --table-name "$TABLE_NAME" 2>/dev/null; then
            aws dynamodb create-table --table-name "$TABLE_NAME" --attribute-definitions AttributeName=LockID,AttributeType=S --key-schema AttributeName=LockID,KeyType=HASH --billing-mode PAY_PER_REQUEST --region us-east-1
          fi

      - name: 4. Initialize Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: 5. Execute Code Schema Test & Plan Validation
        run: |
          cd terraform/environments/${{ env.TARGET_ENV }}
          terraform init \
            -backend-config="bucket=${{ steps.bootstrap.outputs.using_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.bootstrap.outputs.using_table }}" \
            -backend-config="key=${{ env.TARGET_ENV }}/terraform.tfstate"
          terraform plan -lock-timeout=10m
        env:
          TF_VAR_db_username: ${{ env.TARGET_ENV == 'prod' && secrets.DB_USERNAME_PROD || secrets.DB_USERNAME_DEV }}
          TF_VAR_db_password: ${{ env.TARGET_ENV == 'prod' && secrets.DB_PASSWORD_PROD || secrets.DB_PASSWORD_DEV }}

  # ==========================================================================
  # STAGE 2: CREATE INFRASTRUCTURE (State Synchronization)
  # ==========================================================================
  create-infrastructure:
    name: 🏗️ Create Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      db_host: ${{ steps.cloud-data.outputs.db_host }}
      ecr_url: ${{ steps.cloud-data.outputs.ecr_url }}
    steps:
      - name: 1. Checkout Code Base
        uses: actions/checkout@v4

      - name: 2. Configure AWS Access
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Dynamic Pre-Flight S3 & DynamoDB Bootstrapping
        id: bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          echo "using_bucket=issue-app-tf-state-${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "using_table=issue-app-tf-locks" >> $GITHUB_OUTPUT

      - name: 4. Initialize Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: 5. Execute Infrastructure Provisioning
        run: |
          cd terraform/environments/${{ env.TARGET_ENV }}
          terraform init \
            -backend-config="bucket=${{ steps.bootstrap.outputs.using_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.bootstrap.outputs.using_table }}" \
            -backend-config="key=${{ env.TARGET_ENV }}/terraform.tfstate"
          terraform apply -lock-timeout=10m -auto-approve
        env:
          TF_VAR_db_username: ${{ env.TARGET_ENV == 'prod' && secrets.DB_USERNAME_PROD || secrets.DB_USERNAME_DEV }}
          TF_VAR_db_password: ${{ env.TARGET_ENV == 'prod' && secrets.DB_PASSWORD_PROD || secrets.DB_PASSWORD_DEV }}

      - name: 6. Extract Live Cloud Target Data
        id: cloud-data
        run: |
          cd terraform/environments/${{ env.TARGET_ENV }}
          RAW_DB=$(terraform output -raw database_endpoint)
          CLEAN_DB=$(echo $RAW_DB | cut -d':' -f1)
          RAW_ECR=$(terraform output -raw ecr_repository_url)
          echo "db_host=$CLEAN_DB" >> $GITHUB_OUTPUT
          echo "ecr_url=$RAW_ECR" >> $GITHUB_OUTPUT

  # ==========================================================================
  # STAGE 3: BUILD AND PUSH DOCKER IMAGES (Artifact Assembly)
  # ==========================================================================
  build-and-push-docker-images:
    name: 📦 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: create-infrastructure
    steps:
      - name: 1. Checkout Code Base
        uses: actions/checkout@v4

      - name: 2. Configure AWS Access
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Authenticate Container Engine to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 4. Compile and Publish Microservices
        run: |
          IMAGE_TAG_SHORT=${GITHUB_SHA::7}
          IMAGE_TAG_FULL=${GITHUB_SHA}
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          BASE_REGISTRY="${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
          
          # Clean execution loop tracking across directories
          SERVICES=("api-gateway" "auth-service" "frontend-service" "issue-service")
          for SERVICE in "${SERVICES[@]}"; do
            echo "=== ASSEMBLING ARTIFACT: ${SERVICE} ==="
            cd $SERVICE
            docker build -t $BASE_REGISTRY/prod-${SERVICE}:$IMAGE_TAG_SHORT -t $BASE_REGISTRY/prod-${SERVICE}:$IMAGE_TAG_FULL .
            docker push $BASE_REGISTRY/prod-${SERVICE}:$IMAGE_TAG_SHORT
            docker push $BASE_REGISTRY/prod-${SERVICE}:$IMAGE_TAG_FULL
            cd ..
          done

  # ==========================================================================
  # STAGE 4: DEPLOY APPLICATION (GitOps Manifest Updates)
  # ==========================================================================
  deploy-application:
    name: 🚀 Deploy Application
    runs-on: ubuntu-latest
    needs: [create-infrastructure, build-and-push-docker-images]
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Code Base
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Set Up Kustomize Controller
        uses: imranismail/setup-kustomize@v2

      - name: 3. Inject Live Cloud Metadata into Blueprints
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          BASE_REGISTRY="${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
          IMAGE_TAG_FULL=${GITHUB_SHA}
          
          cd kubernetes/environments/${{ env.TARGET_ENV }}
          
          # Inject dynamic database endpoints 
          sed -i "s|RDS_ENDPOINT_PLACEHOLDER|${{ needs.create-infrastructure.outputs.db_host }}|g" kustomization.yaml
          
          # Bind freshly validated container tags
          kustomize edit set image api-gateway=$BASE_REGISTRY/prod-api-gateway:${IMAGE_TAG_FULL}
          kustomize edit set image auth-service=$BASE_REGISTRY/prod-auth-service:${IMAGE_TAG_FULL}
          kustomize edit set image frontend-service=$BASE_REGISTRY/prod-frontend-service:${IMAGE_TAG_FULL}
          kustomize edit set image issue-service=$BASE_REGISTRY/prod-issue-service:${IMAGE_TAG_FULL}

      - name: 4. Commit and Push Manifest Changes to Git (Triggers ArgoCD)
        run: |
          git config --global user.name "GitHub Actions Automation"
          git config --global user.email "actions@github.com"
          git add kubernetes/environments/${{ env.TARGET_ENV }}/kustomization.yaml
          git diff-index --quiet HEAD || git commit -m "chore(gitops): auto-synced variables for ${{ env.TARGET_ENV }} environment [skip ci]"
          git push origin prod

  # ==========================================================================
  # STAGE 5: DESTROY (Standalone Teardown Track)
  # ==========================================================================
  destroy:
    name: 🗑️ Teardown Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    steps:
      - name: 1. Checkout Code Base
        uses: actions/checkout@v4

      - name: 2. Configure AWS Access
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 3. Dynamic Pre-Flight S3 Map Verification
        id: bootstrap
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          echo "using_bucket=issue-app-tf-state-${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "using_table=issue-app-tf-locks" >> $GITHUB_OUTPUT

      - name: 4. Initialize Terraform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: 5. Execute Core Teardown
        run: |
          cd terraform/environments/${{ env.TARGET_ENV }}
          terraform init \
            -backend-config="bucket=${{ steps.bootstrap.outputs.using_bucket }}" \
            -backend-config="dynamodb_table=${{ steps.bootstrap.outputs.using_table }}" \
            -backend-config="key=${{ env.TARGET_ENV }}/terraform.tfstate"
          terraform destroy -lock-timeout=10m -auto-approve
        env:
          TF_VAR_db_username: ${{ env.TARGET_ENV == 'prod' && secrets.DB_USERNAME_PROD || secrets.DB_USERNAME_DEV }}
          TF_VAR_db_password: ${{ env.TARGET_ENV == 'prod' && secrets.DB_PASSWORD_PROD || secrets.DB_PASSWORD_DEV }}

      - name: 6. Run Post-Destroy Target Cleanup
        run: |
          ECR_REPOS=$(aws ecr describe-repositories --region us-east-1 --query "repositories[?contains(repositoryName, 'issue-app-${{ env.TARGET_ENV }}')].repositoryName" --output text 2>/dev/null || echo "")
          for repo in $ECR_REPOS; do
            aws ecr delete-repository --repository-name $repo --force --region us-east-1 2>/dev/null || true
          done
          LOG_GROUPS=$(aws logs describe-log-groups --region us-east-1 --query "logGroups[?contains(logGroupName, 'issue-app-${{ env.TARGET_ENV }}')].logGroupName" --output text 2>/dev/null || echo "")
          for lg in $LOG_GROUPS; do
            aws logs delete-log-group --log-group-name $lg --region us-east-1 2>/dev/null || true
          done

  # ==========================================================================
  # STAGE 6: NOTIFY STATUS (Ecosystem Reporting Engine)
  # ==========================================================================
  notify-status:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [build-and-test, create-infrastructure, build-and-push-docker-images, deploy-application, destroy]
    if: always() # Guarantees execution regardless of upstream success or failure
    steps:
      - name: 1. Generate Pipeline Run Summary Dashboard
        run: |
          echo "## 🚀 Pipeline Execution Status Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "#### Targeted Environment: \`${{ env.TARGET_ENV }}\` | Intended Action: \`${{ env.TARGET_ACTION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Operational Lifecycle Stage | Execution Status | Map Key |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          
          # Inspect Deploy workflow branch states
          if [ "${{ env.TARGET_ACTION }}" = "deploy" ]; then
            echo "| 🧪 Schema Validation & Testing | ${{ needs.build-and-test.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }} | \`stage-1\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 🏗️ Cloud Infrastructure Sync | ${{ needs.create-infrastructure.result == 'success' && '✅ SUCCESS' || (needs.create-infrastructure.result == 'skipped' && '⏭️ SKIPPED' || '❌ FAILED') }} | \`stage-2\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 📦 Docker Artifact Generation | ${{ needs.build-and-push-docker-images.result == 'success' && '✅ SUCCESS' || (needs.build-and-push-docker-images.result == 'skipped' && '⏭️ SKIPPED' || '❌ FAILED') }} | \`stage-3\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 🚀 GitOps Application Deployment | ${{ needs.deploy-application.result == 'success' && '✅ SUCCESS' || (needs.deploy-application.result == 'skipped' && '⏭️ SKIPPED' || '❌ FAILED') }} | \`stage-4\` |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Inspect Teardown workflow branch states
          if [ "${{ env.TARGET_ACTION }}" = "destroy" ]; then
            echo "| 🗑️ Complete Ecosystem Destruction | ${{ needs.destroy.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }} | \`teardown\` |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by actor: **@${{ github.actor }}** | Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      # 🟢 CHORE: Un-comment this block if you want to push alerts to Slack webhooks later!
      # - name: Send Slack Webhook Notification
      #   if: failure()
      #   run: |
      #     curl -X POST -H 'Content-type: application/json' --data '{"text":"🚨 *Pipeline Failed!* Env: ${{ env.TARGET_ENV }} | Action: ${{ env.TARGET_ACTION }} | Actor: @${{ github.actor }}"}' ${{ secrets.SLACK_WEBHOOK_URL }}