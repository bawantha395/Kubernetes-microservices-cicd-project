
# API GATEWAY - Production (Docker) Profile

server.port=${SERVER_PORT:8096}

# JWT Secret (must be provided via env)
jwt.secret=${JWT_SECRET}

# CORS (set via environment variable, e.g. https://yourdomain.com)
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# Logging
logging.level.org.springframework.security=WARN
logging.level.root=INFO
