spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:80
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        - id: issue-service
          uri: http://issue-service:80
          predicates:
            - Path=/api/issues/**
          filters:
            - StripPrefix=1