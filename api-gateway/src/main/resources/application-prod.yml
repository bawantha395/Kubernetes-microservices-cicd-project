# API GATEWAY - Production (Docker) Routes

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:80        # 🟢 FIXED: Routes via K8s Service Port 80
          predicates:
            - Path=/api/auth/** # 🟢 FIXED: Matches the React Frontend path

        - id: issue-service
          uri: http://issue-service:80      # 🟢 FIXED: Routes via K8s Service Port 80
          predicates:
            - Path=/api/issues/** # 🟢 FIXED: Matches the React Frontend path