
# ISSUE SERVICE - Production (Docker) Profile

server.port=${SERVER_PORT:8098}

# Docker Database Configuration (require explicit env vars in production)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA Settings (minimal logging in production)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Secret (must be provided via env)
jwt.secret=${JWT_SECRET}

# Logging
logging.level.org.springframework.security=WARN
logging.level.root=INFO
