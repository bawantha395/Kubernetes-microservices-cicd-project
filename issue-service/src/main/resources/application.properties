
# ISSUE SERVICE - Common Configuration

spring.application.name=issue-core-service

# Active Profile (override via env: SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Common JPA Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Expiration (common across profiles)
jwt.expirationMinutes=${JWT_EXPIRATIONMINUTES:60}

# Prometheus metrics exposure
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}
